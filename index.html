<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <div class="inputs-container">
        <div class="input-group">
            <input type="text" id="num1" placeholder="123">
            <div class="error-msg" id="error-num1">Введите число</div>
        </div>

        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>

        <div class="input-group">
            <input type="text" id="num2" placeholder="567">
            <div class="error-msg" id="error-num2">Введите число</div>
        </div>
    </div>

    <div class="button-container">
        <button id="calc-btn">подсчитать</button>
    </div>

    <div class="result-container" id="result-box">
        </div>
</div>

<script src="script.js"></script>
</body>
</html>
